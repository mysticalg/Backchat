name: backchat
description: Cross-platform encrypted messaging scaffold with OAuth identity.
publish_to: 'none'
version: 0.1.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  cryptography: ^2.9.0
  flutter_webrtc: ^1.4.1
  http: ^1.6.0
  shared_preferences: ^2.5.5
  tray_manager: ^0.5.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
