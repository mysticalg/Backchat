name: backchat
description: Cross-platform encrypted messaging scaffold with OAuth identity.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cryptography: ^2.7.0
  google_sign_in: ^6.2.1
  http: ^1.5.0
  shared_preferences: ^2.5.3
  tray_manager: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
