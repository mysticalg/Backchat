name: Build Installers and Executables

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: Build Windows executable
        required: false
        type: boolean
        default: true
      build_macos:
        description: Build macOS app bundle
        required: false
        type: boolean
        default: true
      build_linux:
        description: Build Linux bundle
        required: false
        type: boolean
        default: true
      build_android:
        description: Build Android APK and AAB
        required: false
        type: boolean
        default: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(sed -n "s/^version:[[:space:]]*//p" pubspec.yaml | head -n 1 | tr -d "'\r")"
          if [ -z "$app_version" ]; then
            echo "Could not determine app version from pubspec.yaml" >&2
            exit 1
          fi

          release_tag="v${app_version/+/-build.}"
          release_name="Backchat ${app_version}"

          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: prepare-release
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    env:
      BACKCHAT_API_BASE_URL: ${{ vars.BACKCHAT_API_BASE_URL != '' && vars.BACKCHAT_API_BASE_URL || secrets.BACKCHAT_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Windows release
        shell: pwsh
        run: |
          if ($env:BACKCHAT_API_BASE_URL) {
            flutter build windows --release --dart-define="BACKCHAT_API_BASE_URL=$env:BACKCHAT_API_BASE_URL"
          } else {
            flutter build windows --release
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package Windows installer
        shell: pwsh
        run: |
          $appVersion = "${{ needs.prepare-release.outputs.app_version }}"
          $buildDir = (Resolve-Path "build/windows/x64/runner/Release").Path
          $issPath = (Resolve-Path "windows/installer/backchat.iss").Path
          $outputDir = (Resolve-Path ".").Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$appVersion" `
            "/DMyBuildDir=$buildDir" `
            "/DMyOutputDir=$outputDir" `
            $issPath

      - name: Package Windows release
        shell: pwsh
        run: |
          $assetName = "backchat-windows-x64-${{ needs.prepare-release.outputs.app_version }}.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $assetName -CompressionLevel Optimal

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-windows
          path: |
            backchat-windows-x64-${{ needs.prepare-release.outputs.app_version }}-setup.exe
            backchat-windows-x64-${{ needs.prepare-release.outputs.app_version }}.zip

  build-macos:
    needs: prepare-release
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest
    env:
      BACKCHAT_API_BASE_URL: ${{ vars.BACKCHAT_API_BASE_URL != '' && vars.BACKCHAT_API_BASE_URL || secrets.BACKCHAT_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build macOS release
        shell: bash
        run: |
          set -euo pipefail
          build_args=(--release)
          if [ -n "${BACKCHAT_API_BASE_URL:-}" ]; then
            build_args+=(--dart-define="BACKCHAT_API_BASE_URL=${BACKCHAT_API_BASE_URL}")
          fi
          flutter build macos "${build_args[@]}"

      - name: Package macOS release
        shell: bash
        run: |
          set -euo pipefail
          asset_name="backchat-macos-${{ needs.prepare-release.outputs.app_version }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/macos/Build/Products/Release/backchat.app" "$asset_name"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-macos
          path: backchat-macos-${{ needs.prepare-release.outputs.app_version }}.zip

  build-linux:
    needs: prepare-release
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    env:
      BACKCHAT_API_BASE_URL: ${{ vars.BACKCHAT_API_BASE_URL != '' && vars.BACKCHAT_API_BASE_URL || secrets.BACKCHAT_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libayatana-appindicator3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Linux release
        shell: bash
        run: |
          set -euo pipefail
          build_args=(--release)
          if [ -n "${BACKCHAT_API_BASE_URL:-}" ]; then
            build_args+=(--dart-define="BACKCHAT_API_BASE_URL=${BACKCHAT_API_BASE_URL}")
          fi
          flutter build linux "${build_args[@]}"

      - name: Package Linux release
        shell: bash
        run: |
          set -euo pipefail
          asset_name="backchat-linux-x64-${{ needs.prepare-release.outputs.app_version }}.tar.gz"
          tar -C build/linux/x64/release -czf "$asset_name" bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-linux
          path: backchat-linux-x64-${{ needs.prepare-release.outputs.app_version }}.tar.gz

  build-android:
    needs: prepare-release
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    env:
      BACKCHAT_API_BASE_URL: ${{ vars.BACKCHAT_API_BASE_URL != '' && vars.BACKCHAT_API_BASE_URL || secrets.BACKCHAT_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required_vars=(
            ANDROID_UPLOAD_KEYSTORE_BASE64
            ANDROID_UPLOAD_STORE_PASSWORD
            ANDROID_UPLOAD_KEY_ALIAS
            ANDROID_UPLOAD_KEY_PASSWORD
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::Missing required GitHub secret: ${var_name}"
              exit 1
            fi
          done

          keystore_path="$GITHUB_WORKSPACE/android/app/upload-keystore.jks"
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          cat > "$GITHUB_WORKSPACE/android/key.properties" <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$ANDROID_UPLOAD_STORE_PASSWORD
          keyAlias=$ANDROID_UPLOAD_KEY_ALIAS
          keyPassword=$ANDROID_UPLOAD_KEY_PASSWORD
          EOF

      - name: Build Android APK
        shell: bash
        run: |
          set -euo pipefail
          build_args=(--release)
          if [ -n "${BACKCHAT_API_BASE_URL:-}" ]; then
            build_args+=(--dart-define="BACKCHAT_API_BASE_URL=${BACKCHAT_API_BASE_URL}")
          fi
          flutter build apk "${build_args[@]}"

      - name: Build Android app bundle
        shell: bash
        run: |
          set -euo pipefail
          build_args=(--release)
          if [ -n "${BACKCHAT_API_BASE_URL:-}" ]; then
            build_args+=(--dart-define="BACKCHAT_API_BASE_URL=${BACKCHAT_API_BASE_URL}")
          fi
          flutter build appbundle "${build_args[@]}"

      - name: Package Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          cp build/app/outputs/flutter-apk/app-release.apk "backchat-android-${{ needs.prepare-release.outputs.app_version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "backchat-android-${{ needs.prepare-release.outputs.app_version }}.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-android
          path: |
            backchat-android-${{ needs.prepare-release.outputs.app_version }}.apk
            backchat-android-${{ needs.prepare-release.outputs.app_version }}.aab

      - name: Clean Android signing material
        if: ${{ always() }}
        shell: bash
        run: |
          rm -f android/key.properties
          rm -f android/app/upload-keystore.jks

  publish-release:
    needs:
      - prepare-release
      - build-windows
      - build-macos
      - build-linux
      - build-android
    if: >-
      ${{
        always() &&
        (inputs.build_windows || inputs.build_macos || inputs.build_linux || inputs.build_android) &&
        (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
        (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
        (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
        (needs.build-android.result == 'success' || needs.build-android.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-asset-*
          merge-multiple: true

      - name: Show release assets
        shell: bash
        run: |
          set -euo pipefail
          ls -lah release-assets
          compgen -G "release-assets/*" > /dev/null

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare-release.outputs.release_name }}
        run: |
          set -euo pipefail
          notes="Automated build assets from workflow run #${GITHUB_RUN_NUMBER}."

          if gh release view "$RELEASE_TAG" -R "$GH_REPO" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" -R "$GH_REPO" --title "$RELEASE_NAME" --notes "$notes"
          else
            gh release create "$RELEASE_TAG" -R "$GH_REPO" --title "$RELEASE_NAME" --notes "$notes" --target "$GITHUB_SHA"
          fi

          gh release upload "$RELEASE_TAG" -R "$GH_REPO" release-assets/* --clobber
